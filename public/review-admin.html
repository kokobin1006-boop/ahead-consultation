<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aHEAD | 리뷰 어드민</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #FF0090;
      --pink-light: #FF3DAD;
      --pink-dark: #CC0073;
      --white: #ffffff;
      --off-white: #F9F9F9;
      --dark: #0A0A0A;
      --text: #1A1A1A;
      --text-muted: #999999;
      --border: #E5E5E5;
      --bg-pink: #FFF0F6;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

    /* 헤더 */
    .header {
      height: 80px; overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .header-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

    /* 로그인 */
    .login-wrap {
      max-width: 600px; margin: 0 auto; padding: 60px 20px;
      display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px);
    }
    .login-box { width: 100%; max-width: 360px; }
    .login-title {
      font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--text-muted); letter-spacing: 2px; margin-bottom: 20px;
    }
    .login-box input {
      width: 100%; padding: 14px 16px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: 14px; font-family: inherit;
      color: var(--text); outline: none; transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .login-box input:focus { border-color: var(--pink); }
    .login-btn {
      width: 100%; padding: 16px; border-radius: var(--radius);
      font-size: 13px; font-weight: 700; font-family: 'Montserrat', sans-serif;
      cursor: pointer; border: none; letter-spacing: 1px;
      background: var(--pink); color: var(--white);
      box-shadow: 0 4px 20px rgba(255,18,120,0.3);
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--pink-dark); }
    .login-error { font-size: 12px; color: var(--pink); margin-top: 8px; display: none; }

    /* 대시보드 */
    .dashboard { display: none; }
    .dash-bar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; max-width: 900px; margin: 0 auto;
    }
    .dash-label {
      font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; color: var(--text-muted); letter-spacing: 2px;
    }
    .logout-btn {
      font-family: 'Montserrat', sans-serif; font-size: 10px;
      color: var(--text-muted); cursor: pointer; padding: 5px 12px;
      border: 1px solid var(--border); border-radius: 20px; background: none;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--pink); color: var(--pink); }

    .dash-wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }

    /* 통계 */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px; text-align: center;
    }
    .stat-num {
      font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; color: var(--pink);
    }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* 필터 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 12px; font-family: inherit; background: var(--white);
      color: var(--text); outline: none; cursor: pointer;
    }
    .filter-bar select:focus { border-color: var(--pink); }

    /* 리뷰 카드 */
    .review-card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 10px;
      position: relative; transition: border-color 0.2s;
    }
    .review-card.bad { border-left: 3px solid var(--pink); }
    .review-card.good { border-left: 3px solid #43a047; }
    .review-card:hover { border-color: #ccc; }

    .review-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .review-date {
      font-family: 'Montserrat', sans-serif; font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .revisit-badge {
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 99px; letter-spacing: 0.5px;
    }
    .revisit-badge.yes { background: #E8F5E9; color: #2E7D32; }
    .revisit-badge.maybe { background: #FFF8E1; color: #F57F17; }
    .revisit-badge.no { background: var(--bg-pink); color: var(--pink); }

    .review-ratings { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
    .r-item { }
    .r-item .r-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; letter-spacing: 0.3px; }
    .r-item .r-stars { font-size: 15px; }

    .review-text {
      font-size: 13px; color: var(--text); line-height: 1.7;
      background: var(--off-white); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
    }
    .review-text.complaint { background: var(--bg-pink); }
    .review-text .t-label { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.5px; }

    .del-btn {
      position: absolute; top: 14px; right: 14px; background: none; border: none;
      cursor: pointer; font-size: 14px; opacity: 0.25; transition: opacity 0.2s; padding: 4px;
    }
    .del-btn:hover { opacity: 1; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 12px; letter-spacing: 1px; font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <img src="ahead-header.jpeg" class="header-img" alt="aHEAD" />
</header>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-title">REVIEW ADMIN</div>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">LOGIN →</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 대시보드 -->
<div class="dashboard" id="dashboard">
  <div class="dash-bar">
    <div class="dash-label">REVIEW DASHBOARD</div>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
  </div>

  <div class="dash-wrap">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">총 리뷰</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-overall">-</div><div class="stat-label">평균 전체 만족도</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-staff">-</div><div class="stat-label">평균 직원 응대</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-revisit">-</div><div class="stat-label">재방문 의향</div></div>
    </div>

    <div class="filter-bar">
      <select id="filter-rating" onchange="renderReviews()">
        <option value="">별점 전체</option>
        <option value="5">⭐⭐⭐⭐⭐ 5점</option>
        <option value="4">⭐⭐⭐⭐ 4점</option>
        <option value="low">⭐⭐⭐ 3점 이하</option>
      </select>
      <select id="filter-revisit" onchange="renderReviews()">
        <option value="">재방문 전체</option>
        <option value="yes">재방문 예정</option>
        <option value="maybe">고민 중</option>
        <option value="no">재방문 없음</option>
      </select>
    </div>

    <div id="reviews-container"><div class="loading">LOADING...</div></div>
  </div>
</div>

<script>
  let adminPw = '';
  let allReviews = [];

  async function doLogin() {
    const pw = document.getElementById('pw-input').value;
    adminPw = pw;
    try {
      const res = await fetch('/api/ahead/reviews', { headers: { 'x-admin-password': adminPw } });
      if (res.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        adminPw = '';
        return;
      }
      const data = await res.json();
      allReviews = [...data.data].reverse();
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      updateStats();
      renderReviews();
    } catch {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').textContent = '서버 연결 오류';
    }
  }

  function logout() {
    adminPw = ''; allReviews = [];
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('login-error').style.display = 'none';
  }

  function updateStats() {
    const total = allReviews.length;
    const withOverall = allReviews.filter(r => r.overallRating);
    const withStaff = allReviews.filter(r => r.staffRating);
    const avgOverall = withOverall.length ? (withOverall.reduce((s, r) => s + r.overallRating, 0) / withOverall.length).toFixed(1) : '-';
    const avgStaff = withStaff.length ? (withStaff.reduce((s, r) => s + r.staffRating, 0) / withStaff.length).toFixed(1) : '-';
    const revisitYes = allReviews.filter(r => r.revisit === 'yes').length;
    const revisitPct = total ? Math.round(revisitYes / total * 100) + '%' : '-';

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-overall').textContent = avgOverall;
    document.getElementById('stat-staff').textContent = avgStaff;
    document.getElementById('stat-revisit').textContent = revisitPct;
  }

  function starsHtml(n) {
    if (!n) return '<span style="color:#ccc;font-size:11px">-</span>';
    return '⭐'.repeat(n);
  }

  function revisitLabel(v) {
    if (v === 'yes') return '<span class="revisit-badge yes">재방문 예정 😍</span>';
    if (v === 'maybe') return '<span class="revisit-badge maybe">고민 중 🤔</span>';
    if (v === 'no') return '<span class="revisit-badge no">재방문 없음 😔</span>';
    return '';
  }

  function renderReviews() {
    const fr = document.getElementById('filter-rating').value;
    const fv = document.getElementById('filter-revisit').value;

    const filtered = allReviews.filter(r => {
      if (fr === '5' && r.overallRating !== 5) return false;
      if (fr === '4' && r.overallRating !== 4) return false;
      if (fr === 'low' && r.overallRating > 3) return false;
      if (fv && r.revisit !== fv) return false;
      return true;
    });

    const container = document.getElementById('reviews-container');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state">해당하는 리뷰가 없어요.</div>';
      return;
    }

    container.innerHTML = filtered.map(r => {
      const isBad = r.overallRating && r.overallRating <= 2;
      const isGood = r.overallRating && r.overallRating >= 4;
      const date = new Date(r.submittedAt).toLocaleString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });
      return `
      <div class="review-card ${isBad ? 'bad' : isGood ? 'good' : ''}">
        <button class="del-btn" onclick="deleteReview(${r.id})" title="삭제">🗑</button>
        <div class="review-top">
          <div class="review-date">${date}</div>
          ${revisitLabel(r.revisit)}
        </div>
        <div class="review-ratings">
          <div class="r-item"><div class="r-label">전체 만족도</div><div class="r-stars">${starsHtml(r.overallRating)}</div></div>
          <div class="r-item"><div class="r-label">직원 응대</div><div class="r-stars">${starsHtml(r.staffRating)}</div></div>
          <div class="r-item"><div class="r-label">시술 결과</div><div class="r-stars">${starsHtml(r.resultRating)}</div></div>
        </div>
        ${r.improvement ? `<div class="review-text complaint"><div class="t-label">불편사항</div>${r.improvement}</div>` : ''}
        ${r.comment ? `<div class="review-text"><div class="t-label">후기</div>${r.comment}</div>` : ''}
      </div>`;
    }).join('');
  }

  async function deleteReview(id) {
    if (!confirm('이 리뷰를 삭제할까요?')) return;
    await fetch(`/api/ahead/reviews/${id}`, { method: 'DELETE', headers: { 'x-admin-password': adminPw } });
    allReviews = allReviews.filter(r => r.id !== id);
    updateStats();
    renderReviews();
  }
</script>
</body>
</html>
