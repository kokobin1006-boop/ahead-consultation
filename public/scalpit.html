<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scálpit | 사전 상담 설문지</title>
  <meta property="og:title" content="Scálpit | 사전 상담 설문지" />
  <meta property="og:description" content="스칼프잇 방문 전 사전 상담 설문지를 작성해주세요." />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --burg: #7B1A2B;
      --burg-light: #9B2840;
      --burg-dark: #5A1020;
      --cream: #FAF4EE;
      --cream-mid: #F0E6DC;
      --cream-dark: #E8D5C4;
      --gold: #C4A47C;
      --white: #FFFFFF;
      --dark: #1C0E0E;
      --text: #2D1818;
      --text-muted: #8B7070;
      --border: #E2D0C4;
      --bg-burg: #F5ECEC;
      --radius: 0px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 언어 선택 화면 ── */
    .lang-screen {
      position: fixed; inset: 0;
      background: #3A1018;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }
    .lang-screen.hidden { display: none; }

    .lang-brand { text-align: center; margin-bottom: 52px; }
    .lang-brand-logo {
      height: 52px; width: auto;
      filter: brightness(0) invert(1);
      display: block; margin: 0 auto 12px;
    }
    .lang-brand-line {
      width: 32px; height: 1px;
      background: var(--gold); margin: 14px auto;
    }
    .lang-brand-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; letter-spacing: 5px;
      color: var(--gold); font-weight: 500;
      text-transform: uppercase;
    }
    .lang-prompt {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 20px; text-align: center;
    }
    .lang-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%; max-width: 260px;
    }
    .lang-btn {
      padding: 20px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      cursor: pointer; text-align: center;
      transition: all 0.25s;
    }
    .lang-btn:hover { border-color: var(--gold); background: rgba(196,164,124,0.08); }
    .lang-btn .lang-code {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 3px;
      color: var(--white); display: block; margin-bottom: 5px;
    }
    .lang-btn .lang-native { font-size: 12px; color: rgba(255,255,255,0.4); }

    /* ── 헤더 ── */
    .header {
      background: var(--burg);
      padding: 22px 24px 20px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 600px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo {
      height: 28px; width: auto;
      filter: brightness(0) invert(1);
      display: block;
    }
    .header-tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 7px; letter-spacing: 3px;
      color: rgba(255,255,255,0.5); font-weight: 400;
      margin-top: 5px; text-transform: uppercase;
    }
    .lang-switcher {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; color: rgba(255,255,255,0.55);
      cursor: pointer; letter-spacing: 1.5px;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent; transition: all 0.2s;
      display: none;
    }
    .lang-switcher:hover { border-color: rgba(255,255,255,0.6); color: white; }

    /* ── 컨테이너 ── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 40px 20px 140px; }

    /* ── 공지 ── */
    .notice {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 2px solid var(--burg);
      padding: 16px 20px; margin-bottom: 40px;
      font-size: 13px; color: var(--text); line-height: 1.85;
    }
    .notice strong {
      display: block; margin-bottom: 5px;
      font-size: 9px; color: var(--burg);
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    }

    /* ── 진행 도트 ── */
    .progress-wrap { margin-bottom: 44px; }
    .progress-dots {
      display: flex; align-items: center;
      justify-content: center; gap: 0; margin-bottom: 10px;
    }
    .pdot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border); transition: all 0.35s; flex-shrink: 0;
    }
    .pdot.active { background: var(--burg); transform: scale(1.4); }
    .pdot.done { background: var(--burg); opacity: 0.35; }
    .pline {
      flex: 1; height: 1px; background: var(--border);
      max-width: 56px; transition: background 0.35s;
    }
    .pline.done { background: var(--burg); opacity: 0.35; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--text-muted);
      font-family: 'Montserrat', sans-serif; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .progress-label .pct { color: var(--burg); }

    /* ── 단계 ── */
    .step { display: none; }
    .step.active { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .step-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 600; color: var(--burg);
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px;
    }
    .step-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 400; font-style: italic;
      color: var(--dark); margin-bottom: 8px; line-height: 1.15;
    }
    .step-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 36px; line-height: 1.85; }
    .step-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 36px; }

    /* ── 질문 블록 ── */
    .q-block { margin-bottom: 32px; }
    .q-label {
      font-size: 13px; font-weight: 700; color: var(--dark);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .q-label .req { color: var(--burg); font-size: 15px; line-height: 1; }
    .q-hint { font-size: 11px; color: var(--text-muted); font-weight: 400; }

    /* ── 카드 옵션 ── */
    .card-options { display: flex; flex-direction: column; gap: 7px; }
    .card-option { position: relative; }
    .card-option input { position: absolute; opacity: 0; width: 0; height: 0; }
    .card-option label {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 20px;
      background: var(--white); border: 1px solid var(--border);
      cursor: pointer; font-size: 13.5px; font-weight: 400;
      color: var(--text); transition: all 0.2s; user-select: none; line-height: 1.5;
    }
    .card-option label:hover { border-color: var(--burg); background: #FFF8F5; }
    .card-option input:checked + label { border-color: var(--burg); background: var(--bg-burg); color: var(--dark); font-weight: 600; }
    .dot {
      width: 16px; height: 16px; border: 1px solid var(--border);
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .card-option input:checked + label .dot { background: var(--burg); border-color: var(--burg); }
    .card-option input:checked + label .dot::after {
      content: ''; width: 5px; height: 5px;
      background: white; border-radius: 50%; display: block;
    }
    .card-option.checkbox .dot { border-radius: 2px; }
    .card-option.checkbox input:checked + label .dot::after {
      content: '✓'; width: auto; height: auto;
      background: none; color: white; font-size: 9px; font-weight: 900; border-radius: 0;
    }

    /* 서비스 카드 */
    .service-card label {
      flex-direction: column; align-items: flex-start; gap: 0;
      padding: 18px 52px 18px 20px; position: relative;
    }
    .service-card label .dot { position: absolute; right: 18px; top: 20px; }
    .service-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-weight: 600; font-style: italic;
      color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 3px;
    }
    .service-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .service-sub-tag {
      display: inline-block; font-size: 11px;
      color: var(--text-muted); font-weight: 400; margin-bottom: 8px;
    }
    .service-desc {
      font-size: 12px; color: var(--text-muted); line-height: 1.7;
      font-weight: 400; border-top: 1px solid var(--border);
      padding-top: 8px; margin-top: 4px; width: 100%;
    }
    .service-card input:checked + label .service-en { color: var(--burg); }
    .service-card input:checked + label .service-desc { border-top-color: #DEC0C0; }

    /* 그리드 */
    .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    @media (max-width: 400px) { .grid-options { grid-template-columns: 1fr; } }

    /* ── 텍스트 입력 ── */
    .text-input {
      width: 100%; padding: 14px 16px;
      background: var(--white); border: 1px solid var(--border);
      font-size: 14px; font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--burg); }
    .text-input::placeholder { color: #C8B8B0; }
    textarea.text-input { resize: vertical; min-height: 90px; }

    /* ── 버튼 ── */
    .btn-wrap { display: flex; gap: 10px; margin-top: 44px; }
    .btn {
      flex: 1; padding: 16px;
      font-size: 10px; font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer; border: none;
      transition: all 0.2s; letter-spacing: 2.5px; text-transform: uppercase;
    }
    .btn-prev { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-prev:hover { border-color: var(--burg); color: var(--burg); }
    .btn-next { background: var(--dark); color: var(--white); }
    .btn-next:hover { background: var(--burg); }
    .btn-submit { background: var(--burg); color: var(--white); }
    .btn-submit:hover { background: var(--burg-dark); transform: translateY(-1px); }

    /* ── 완료 화면 ── */
    .done-screen { display: none; text-align: center; padding: 80px 20px 60px; animation: fadeUp 0.4s ease; }
    .done-screen.show { display: block; }
    .done-mark {
      width: 60px; height: 60px; border: 1px solid var(--burg);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 22px; color: var(--burg);
    }
    .done-logo {
      height: 36px; width: auto; margin-bottom: 8px;
      filter: brightness(0) saturate(100%) invert(14%) sepia(60%) saturate(800%) hue-rotate(320deg) brightness(70%);
    }
    .done-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; letter-spacing: 4px; color: var(--gold);
      margin-bottom: 32px; text-transform: uppercase;
    }
    .done-title { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
    .done-desc { font-size: 13px; color: var(--text-muted); line-height: 2; white-space: pre-line; }
    .done-info {
      margin: 28px auto 0; background: var(--white);
      border: 1px solid var(--border); padding: 20px;
      text-align: left; max-width: 400px;
    }
    .done-info-row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .done-info-row:last-child { border-bottom: none; }
    .done-info-row .key { color: var(--text-muted); }
    .done-info-row .val { font-weight: 700; color: var(--dark); text-align: right; max-width: 60%; }

    /* ── 에러 ── */
    .error-msg { font-size: 12px; color: var(--burg); margin-top: 6px; display: none; }
    .error-msg.show { display: block; }

    /* ── 개인정보 동의 ── */
    .privacy-box {
      margin-top: 32px; border: 1px solid var(--border);
      padding: 20px; background: var(--white);
    }
    .privacy-item { margin-bottom: 14px; }
    .privacy-item:last-child { margin-bottom: 0; }
    .privacy-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; user-select: none; }
    .privacy-label input[type="checkbox"] { display: none; }
    .privacy-check {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 2px;
      margin-top: 2px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .privacy-label input:checked ~ .privacy-check { background: var(--burg); border-color: var(--burg); }
    .privacy-label input:checked ~ .privacy-check::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 900; }
    .privacy-text { font-size: 13px; font-weight: 600; color: var(--dark); line-height: 1.4; }
    .required-item .privacy-text::before { content: '[필수] '; color: var(--burg); }
    .privacy-detail { font-size: 11px; color: var(--text-muted); line-height: 1.6; margin: 6px 0 4px 26px; }
    .privacy-link { display: inline-block; margin-left: 26px; font-size: 11px; color: var(--burg); text-decoration: underline; }

    /* ── 사업자 정보 ── */
    .biz-info { margin-top: 16px; font-size: 11px; color: var(--text-muted); line-height: 1.8; text-align: center; }
  </style>
</head>
<body>

<!-- ==================== 언어 선택 화면 ====================
<div class="lang-screen" id="langScreen">
  <div class="lang-brand">
    <img src="scalpit-logo.png" alt="Scálpit" class="lang-brand-logo" />
    <div class="lang-brand-line"></div>
    <div class="lang-brand-sub">Head Spa &amp; Scalp Care</div>
  </div>
  <div class="lang-prompt">Select your language</div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="selectLang('ko')">
      <span class="lang-code">KO</span>
      <span class="lang-native">한국어</span>
    </button>
    <button class="lang-btn" onclick="selectLang('en')">
      <span class="lang-code">EN</span>
      <span class="lang-native">English</span>
    </button>
    <button class="lang-btn" onclick="selectLang('zh')">
      <span class="lang-code">ZH</span>
      <span class="lang-native">中文</span>
    </button>
    <button class="lang-btn" onclick="selectLang('ja')">
      <span class="lang-code">JA</span>
      <span class="lang-native">日本語</span>
    </button>
  </div>
</div>

<!-- 헤더 -->
<header class="header" style="display:none" id="mainHeader">
  <div class="header-inner">
    <div>
      <img src="scalpit-logo.png" alt="Scálpit" class="header-logo" />
      <div class="header-tagline">Head Spa &amp; Scalp Care</div>
    </div>
    <button class="lang-switcher" id="langSwitchBtn" onclick="openLangScreen()"></button>
  </div>
</header>

<div class="wrap" id="formWrap" style="display:none">

  <div class="notice">
    <strong id="nTitle">NOTICE</strong>
    <span id="nBody"></span>
  </div>

  <!-- 진행 도트 -->
  <div class="progress-wrap">
    <div class="progress-dots">
      <div class="pdot active" id="dot1"></div>
      <div class="pline" id="line1"></div>
      <div class="pdot" id="dot2"></div>
      <div class="pline" id="line2"></div>
      <div class="pdot" id="dot3"></div>
      <div class="pline" id="line3"></div>
      <div class="pdot" id="dot4"></div>
      <div class="pline" id="line4"></div>
      <div class="pdot" id="dot5"></div>
    </div>
    <div class="progress-label">
      <span id="stepLabel">STEP 1 / 5</span>
      <span class="pct" id="stepPct">20%</span>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="step-eyebrow" id="s1Eyebrow"></div>
    <div class="step-title" id="s1Title"></div>
    <div class="step-desc" id="s1Desc"></div>
    <div class="step-divider"></div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qRes"></span></div>
      <div class="card-options">
        <div class="card-option">
          <input type="radio" name="reservationType" id="r1" value="">
          <label for="r1"><span class="dot"></span> <span id="rLabel1"></span></label>
        </div>
        <div class="card-option">
          <input type="radio" name="reservationType" id="r2" value="">
          <label for="r2"><span class="dot"></span> <span id="rLabel2"></span></label>
        </div>
        <div class="card-option">
          <input type="radio" name="reservationType" id="r3" value="">
          <label for="r3"><span class="dot"></span> <span id="rLabel3"></span></label>
        </div>
      </div>
      <div class="error-msg" id="err-reservationType"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-next" id="btnNext1" onclick="nextStep(1)"></button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div class="step-eyebrow" id="s2Eyebrow"></div>
    <div class="step-title" id="s2Title"></div>
    <div class="step-desc" id="s2Desc"></div>
    <div class="step-divider"></div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qName"></span></div>
      <input type="text" class="text-input" id="name" />
      <div class="error-msg" id="err-name"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qBirth"></span></div>
      <input type="text" class="text-input" id="birthdate" maxlength="8" />
      <div class="error-msg" id="err-birthdate"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qPhone"></span></div>
      <input type="tel" class="text-input" id="phone" />
      <div class="error-msg" id="err-phone"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qAddr"></span> <span class="q-hint" id="qAddrHint"></span></div>
      <input type="text" class="text-input" id="address" />
      <div class="error-msg" id="err-address"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-prev" id="btnPrev2" onclick="prevStep(2)"></button>
      <button class="btn btn-next" id="btnNext2" onclick="nextStep(2)"></button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="step-eyebrow" id="s3Eyebrow"></div>
    <div class="step-title" id="s3Title"></div>
    <div class="step-desc" id="s3Desc"></div>
    <div class="step-divider"></div>

    <div class="q-block">
      <div class="q-label"><span id="qTreat"></span> <span class="q-hint" id="treatHint"></span></div>
      <div class="card-options">
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th1" value=""><label for="th1"><span class="dot"></span> <span id="thLabel1"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th2" value=""><label for="th2"><span class="dot"></span> <span id="thLabel2"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th3" value=""><label for="th3"><span class="dot"></span> <span id="thLabel3"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th4" value=""><label for="th4"><span class="dot"></span> <span id="thLabel4"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th5" value=""><label for="th5"><span class="dot"></span> <span id="thLabel5"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th6" value=""><label for="th6"><span class="dot"></span> <span id="thLabel6"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th7" value=""><label for="th7"><span class="dot"></span> <span id="thLabel7"></span></label></div>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qSrc"></span></div>
      <div class="card-options">
        <div class="card-option"><input type="radio" name="visitSource" id="vs1" value="Instagram"><label for="vs1"><span class="dot"></span> Instagram</label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs2" value="YouTube"><label for="vs2"><span class="dot"></span> YouTube</label></div>

function updateProgress() {
  const t = T[lang];
  const pct = Math.round((currentStep / TOTAL_STEPS) * 100);
  document.getElementById('stepLabel').textContent = t.step_of(currentStep, TOTAL_STEPS);
  document.getElementById('stepPct').textContent = `${pct}%`;
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const dot = document.getElementById(`dot${i}`);
    dot.classList.remove('active', 'done');
    if (i < currentStep) dot.classList.add('done');
    else if (i === currentStep) dot.classList.add('active');
    if (i < TOTAL_STEPS) {
      const line = document.getElementById(`line${i}`);
      line.classList.toggle('done', i < currentStep);
    }
  }
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${n}`).classList.add('active');
  currentStep = n;
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showErr(id, show) {
  const el = document.getElementById(`err-${id}`);
  if (el) el.classList.toggle('show', show);
}

function nextStep(from) {
  const t = T[lang];
  let ok = true;

  if (from === 1) {
    const v = document.querySelector('input[name="reservationType"]:checked');
    if (!v) { showErr('reservationType', true); ok = false; }
    else showErr('reservationType', false);
  }
  if (from === 2) {
    const nm = document.getElementById('name').value.trim();
    const bd = document.getElementById('birthdate').value.trim();
    const ph = document.getElementById('phone').value.trim();
    const ad = document.getElementById('address').value.trim();
    if (!nm) { showErr('name', true); ok = false; } else showErr('name', false);
    if (!bd) { showErr('birthdate', true); ok = false; } else showErr('birthdate', false);
    if (!ph) { showErr('phone', true); ok = false; } else showErr('phone', false);
    if (!ad) { showErr('address', true); ok = false; } else showErr('address', false);
  }
  if (from === 3) {
    const v = document.querySelector('input[name="visitSource"]:checked');
    if (!v) { showErr('visitSource', true); ok = false; }
    else showErr('visitSource', false);
  }
  if (from === 4) {
    const sc = document.querySelectorAll('input[name="scalpConcerns"]:checked');
    if (!sc.length) { showErr('scalpConcerns', true); ok = false; } else showErr('scalpConcerns', false);
    const sf = document.querySelector('input[name="shampooFrequency"]:checked');
    if (!sf) { showErr('shampooFrequency', true); ok = false; } else showErr('shampooFrequency', false);
  }

  if (ok) showStep(from + 1);
}

function prevStep(from) { showStep(from - 1); }

async function submitForm() {
  const t = T[lang];
  const ds = [...document.querySelectorAll('input[name="desiredServices"]:checked')].map(x => x.value);
  if (!ds.length) { showErr('desiredServices', true); return; }
  showErr('desiredServices', false);
  if (!document.getElementById('privacyRequired').checked) { showErr('privacy', true); return; }
  showErr('privacy', false);

  const btn = document.getElementById('btnSubmit');
  btn.textContent = t.btn_ing; btn.disabled = true;

  const data = {
    lang,
    reservationType: document.querySelector('input[name="reservationType"]:checked')?.value || '',
    name: document.getElementById('name').value.trim(),
    birthdate: document.getElementById('birthdate').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    address: document.getElementById('address').value.trim(),
    treatmentHistory: [...document.querySelectorAll('input[name="treatmentHistory"]:checked')].map(x => x.value),
    visitSource: document.querySelector('input[name="visitSource"]:checked')?.value || '',
    scalpConcerns: [...document.querySelectorAll('input[name="scalpConcerns"]:checked')].map(x => x.value),
    shampooFrequency: document.querySelector('input[name="shampooFrequency"]:checked')?.value || '',
    desiredServices: ds,
    marketingConsent: document.getElementById('privacyMarketing').checked,
  };

  try {
    const res = await fetch('/api/scalpit/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error('server');
    const json = await res.json();
    if (!json.success) throw new Error('server');

    document.getElementById('formWrap').style.display = 'none';
    const done = document.getElementById('doneScreen');
    document.getElementById('doneTitle').textContent = t.done_title;
    document.getElementById('doneDesc').textContent = t.done_desc;
    document.getElementById('doneInfo').innerHTML = `
      <div class="done-info-row"><span class="key">${t.done_name}</span><span class="val">${data.name}</span></div>
      <div class="done-info-row"><span class="key">${t.done_phone}</span><span class="val">${data.phone}</span></div>
      <div class="done-info-row"><span class="key">${t.done_res}</span><span class="val">${data.reservationType}</span></div>
      <div class="done-info-row"><span class="key">${t.done_serv}</span><span class="val">${data.desiredServices.join(', ')}</span></div>
    `;
    done.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    btn.textContent = t.btn_submit; btn.disabled = false;
    alert(e.message === 'server' ? t.err_server : t.err_network);
  }
}
</script>
</body>
</html>
