<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스칼프잇 | 고객 상담 내역 (관리자)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #7B2D2D; --red-light: #9B3D3D; --red-dark: #5A1F1F;
      --cream: #FDF6F0; --dark: #1C0A0A; --text: #2C1A1A;
      --text-light: #7A5A5A; --border: #E8D8D0; --white: #fff;
      --gray: #F7F0ED;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); }

    .header {
      background: var(--dark);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--red);
    }
    .logo { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 2px; }
    .logo span { color: #C9A090; }
    .header-badge { background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }

    /* 로그인 */
    .login-wrap {
      max-width: 400px; margin: 80px auto; padding: 40px 32px;
      background: var(--white); border-radius: 16px;
      box-shadow: 0 4px 32px rgba(123,45,45,0.12);
      text-align: center;
    }
    .login-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: var(--dark); }
    .login-sub { font-size: 14px; color: var(--text-light); margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 14px 16px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
      outline: none; margin-bottom: 14px;
    }
    .login-input:focus { border-color: var(--red); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--red); color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .login-btn:hover { background: var(--red-light); }
    .login-err { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* 대시보드 */
    .dashboard { max-width: 1100px; margin: 0 auto; padding: 32px 16px 80px; display: none; }
    .stat-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px;
      background: var(--white); border-radius: 14px;
      padding: 20px; border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(123,45,45,0.06);
    }
    .stat-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
    .stat-val { font-size: 28px; font-weight: 900; color: var(--dark); }
    .stat-val span { font-size: 14px; font-weight: 400; color: var(--text-light); }

    .section-title {
      font-size: 18px; font-weight: 700; color: var(--dark);
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .export-btn {
      margin-left: auto; padding: 8px 16px;
      background: var(--dark); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .export-btn:hover { background: var(--red); }

    /* 필터/검색 */
    .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 180px; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none;
    }
    .search-input:focus { border-color: var(--red); }

    /* 테이블 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 16px rgba(123,45,45,0.07); }
    thead { background: var(--dark); color: #fff; }
    thead th { padding: 14px 12px; font-size: 13px; font-weight: 700; text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--gray); transition: background 0.15s; }
    tbody tr:hover { background: #FFF8F6; }
    tbody td { padding: 12px 12px; font-size: 13px; color: var(--text); vertical-align: top; }
    .tag {
      display: inline-block; padding: 2px 8px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      background: #FFF0EE; color: var(--red); margin: 2px;
    }
    .tag.service { background: #EEF6FF; color: #2D5B7B; }
    .tag.source { background: #F0FFF0; color: #2B7B3D; }
    .del-btn {
      padding: 5px 10px; background: #FFF0EE; color: var(--red);
      border: 1px solid #F0C0C0; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    }
    .del-btn:hover { background: var(--red); color: #fff; }
    .empty { text-align: center; padding: 48px; color: var(--text-light); font-size: 15px; }

    /* 모달 */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px; padding: 32px;
      max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: var(--dark); }
    .modal-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--gray); gap: 12px; }
    .modal-row:last-child { border-bottom: none; }
    .modal-key { width: 120px; flex-shrink: 0; font-size: 13px; color: var(--text-light); font-weight: 500; }
    .modal-val { font-size: 13px; color: var(--dark); font-weight: 500; flex: 1; }
    .modal-close {
      margin-top: 20px; width: 100%; padding: 12px; background: var(--dark);
      color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }

    @media (max-width: 600px) {
      .stat-card { min-width: 100px; }
      thead th, tbody td { font-size: 12px; padding: 10px 8px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">SCALP<span>IT</span> <span style="font-size:13px; font-weight:400; color:#888; margin-left:8px;">관리자</span></div>
  <div class="header-badge">ADMIN</div>
</header>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-title">🔐 관리자 로그인</div>
  <div class="login-sub">스칼프잇 고객 상담 데이터 열람</div>
  <input type="password" class="login-input" id="pwInput" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') doLogin()" />
  <button class="login-btn" onclick="doLogin()">로그인</button>
  <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
</div>

<!-- 대시보드 -->
<div class="dashboard" id="dashboard">
  <div class="stat-row" id="statRow"></div>

  <div class="section-title">
    고객 상담 내역
    <button class="export-btn" onclick="exportCSV()">CSV 다운로드</button>
  </div>

  <div class="filter-row">
    <input type="text" class="search-input" id="searchInput" placeholder="이름, 연락처 검색..." oninput="renderTable()" />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>제출일시</th>
          <th>이름</th>
          <th>연락처</th>
          <th>주소</th>
          <th>예약</th>
          <th>두피 고민</th>
          <th>원하는 서비스</th>
          <th>유입 경로</th>
          <th>영상동의</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-title">고객 상세 정보</div>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
  let adminPassword = '';
  let allData = [];

  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    adminPassword = pw;
    fetchData();
  }

  async function fetchData() {
    try {
      const res = await fetch('/api/submissions', {
        headers: { 'x-admin-password': adminPassword }
      });
      const data = await res.json();
      if (!data.success) {
        document.getElementById('loginErr').style.display = 'block';
        return;
      }
      allData = data.data.reverse(); // 최신순
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderStats();
      renderTable();
    } catch {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function renderStats() {
    const total = allData.length;
    const today = new Date().toISOString().slice(0, 10);
    const todayCount = allData.filter(d => d.submittedAt.startsWith(today)).length;

    const sourceMap = {};
    allData.forEach(d => { sourceMap[d.visitSource] = (sourceMap[d.visitSource] || 0) + 1; });
    const topSource = Object.entries(sourceMap).sort((a, b) => b[1] - a[1])[0];

    const serviceMap = {};
    allData.forEach(d => (d.desiredServices || []).forEach(s => { serviceMap[s] = (serviceMap[s] || 0) + 1; }));
    const topService = Object.entries(serviceMap).sort((a, b) => b[1] - a[1])[0];

    document.getElementById('statRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">전체 응답</div><div class="stat-val">${total} <span>건</span></div></div>
      <div class="stat-card"><div class="stat-label">오늘 응답</div><div class="stat-val">${todayCount} <span>건</span></div></div>
      <div class="stat-card"><div class="stat-label">주요 유입 경로</div><div class="stat-val" style="font-size:18px">${topSource ? topSource[0] : '-'}</div></div>
      <div class="stat-card"><div class="stat-label">인기 서비스</div><div class="stat-val" style="font-size:16px">${topService ? topService[0] : '-'}</div></div>
    `;
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const rows = allData.filter(d =>
      d.name.toLowerCase().includes(q) || d.phone.includes(q)
    );

    const tbody = document.getElementById('tableBody');
    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="11" class="empty">조회된 고객이 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map((d, i) => `
      <tr onclick="openModal(${d.id})" style="cursor:pointer">
        <td>${rows.length - i}</td>
        <td>${formatDate(d.submittedAt)}</td>
        <td><strong>${d.name}</strong></td>
        <td>${d.phone}</td>
        <td>${d.address}</td>
        <td><span class="tag">${d.reservationType}</span></td>
        <td>${(d.scalpConcerns || []).map(t => `<span class="tag">${t}</span>`).join('')}</td>
        <td>${(d.desiredServices || []).map(t => `<span class="tag service">${t}</span>`).join('')}</td>
        <td><span class="tag source">${d.visitSource}</span></td>
        <td>${d.videoConsent === '동의' ? '✅' : '❌'}</td>
        <td onclick="event.stopPropagation()">
          <button class="del-btn" onclick="deleteEntry(${d.id})">삭제</button>
        </td>
      </tr>
    `).join('');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}<br/>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function openModal(id) {
    const d = allData.find(x => x.id === id);
    if (!d) return;
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-row"><div class="modal-key">이름</div><div class="modal-val">${d.name}</div></div>
      <div class="modal-row"><div class="modal-key">생년월일</div><div class="modal-val">${d.birthdate}</div></div>
      <div class="modal-row"><div class="modal-key">연락처</div><div class="modal-val">${d.phone}</div></div>
      <div class="modal-row"><div class="modal-key">주소</div><div class="modal-val">${d.address}</div></div>
      <div class="modal-row"><div class="modal-key">예약 유형</div><div class="modal-val">${d.reservationType}</div></div>
      <div class="modal-row"><div class="modal-key">상담 유형</div><div class="modal-val">${d.consultationType}</div></div>
      <div class="modal-row"><div class="modal-key">치료 이력</div><div class="modal-val">${(d.treatmentHistory||[]).join(', ') || '없음'}</div></div>
      <div class="modal-row"><div class="modal-key">유입 경로</div><div class="modal-val">${d.visitSource}</div></div>
      <div class="modal-row"><div class="modal-key">두피 고민</div><div class="modal-val">${(d.scalpConcerns||[]).join(', ')}</div></div>
      <div class="modal-row"><div class="modal-key">펌/염색 이력</div><div class="modal-val">${d.permDyeHistory || '미입력'}</div></div>
      <div class="modal-row"><div class="modal-key">샴푸 횟수</div><div class="modal-val">${d.shampooFrequency}</div></div>
      <div class="modal-row"><div class="modal-key">원하는 서비스</div><div class="modal-val">${(d.desiredServices||[]).join(', ')}</div></div>
      <div class="modal-row"><div class="modal-key">영상 촬영</div><div class="modal-val">${d.videoConsent}</div></div>
      <div class="modal-row"><div class="modal-key">제출 일시</div><div class="modal-val">${new Date(d.submittedAt).toLocaleString('ko-KR')}</div></div>
    `;
    document.getElementById('modalBg').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('show');
  }

  async function deleteEntry(id) {
    if (!confirm('이 항목을 삭제하시겠습니까?')) return;
    await fetch(`/api/submissions/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': adminPassword }
    });
    allData = allData.filter(d => d.id !== id);
    renderStats();
    renderTable();
  }

  function exportCSV() {
    const headers = ['제출일시','이름','생년월일','연락처','주소','예약유형','상담유형','치료이력','유입경로','두피고민','펌염색이력','샴푸횟수','원하는서비스','영상동의'];
    const rows = allData.map(d => [
      new Date(d.submittedAt).toLocaleString('ko-KR'),
      d.name, d.birthdate, d.phone, d.address,
      d.reservationType, d.consultationType,
      (d.treatmentHistory||[]).join('|'),
      d.visitSource,
      (d.scalpConcerns||[]).join('|'),
      d.permDyeHistory||'',
      d.shampooFrequency,
      (d.desiredServices||[]).join('|'),
      d.videoConsent,
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `scalpit_상담내역_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
