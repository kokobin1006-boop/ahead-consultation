<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><span class="la">a</span>HEAD | Consultation</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #FF0090;
      --pink-light: #FF3DAD;
      --pink-dark: #CC0073;
      --white: #ffffff;
      --off-white: #F9F9F9;
      --dark: #0A0A0A;
      --text: #1A1A1A;
      --text-muted: #999999;
      --border: #E5E5E5;
      --bg-pink: #FFF0F6;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 언어 선택 화면 ── */
    .lang-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      z-index: 200;
      overflow-y: auto;
    }
    .lang-screen.hidden { display: none; }
    .lang-hero {
      width: 100%; height: 52vw; max-height: 340px; min-height: 220px;
      overflow: hidden; flex-shrink: 0;
    }
    .lang-hero img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 48%;
      display: block;
    }
    .lang-inner {
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 24px 48px; width: 100%;
    }
    .lang-tagline { display: none; }
    .lang-logo { display: none; }
    .lang-title {
      font-size: 15px; font-weight: 600;
      color: var(--dark); text-align: center;
      margin-bottom: 6px;
    }
    .lang-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 1px; text-align: center;
      margin-bottom: 28px;
    }
    .lang-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; width: 100%; max-width: 320px;
    }
    .lang-btn {
      padding: 22px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: var(--pink); background: var(--bg-pink); }
    .lang-btn .flag { font-size: 24px; display: block; margin-bottom: 8px; }
    .lang-btn .name { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: var(--dark); letter-spacing: 1px; }
    .lang-btn .native { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── 헤더 ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: 80px; overflow: hidden; padding: 0;
      border-bottom: 1px solid var(--border);
    }
    .header-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }
    .lang-switcher {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; color: #555;
      cursor: pointer; letter-spacing: 0.5px;
      padding: 5px 10px; border: 1px solid #ccc; border-radius: 20px;
      background: rgba(255,255,255,0.85);
    }
    .lang-switcher:hover { border-color: var(--pink); color: var(--pink); }

    /* ── 컨테이너 ── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 36px 20px 140px; }

    /* ── 공지 ── */
    .notice {
      background: var(--bg-pink);
      border: 1px solid #FFD6EA;
      border-left: 3px solid var(--pink);
      border-radius: var(--radius);
      padding: 14px 18px; margin-bottom: 32px;
      font-size: 13px; color: var(--dark); line-height: 1.75;
    }
    .notice strong { display: block; margin-bottom: 4px; font-size: 12px; color: var(--pink); font-weight: 700; letter-spacing: 1px; }

    /* ── 진행바 ── */
    .progress-wrap { margin-bottom: 36px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted); margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 1px;
    }
    .progress-label .pct { color: var(--pink); }
    .progress-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--pink); border-radius: 99px; transition: width 0.4s ease; }

    /* ── 단계 ── */
    .step { display: none; }
    .step.active { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .step-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--dark); margin-bottom: 6px; letter-spacing: -0.3px;
    }
    .step-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; }

    /* ── 질문 블록 ── */
    .q-block { margin-bottom: 28px; }
    .q-label {
      font-size: 14px; font-weight: 700; color: var(--dark);
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .q-label .req { color: var(--pink); font-size: 16px; line-height: 1; }
    .q-hint { font-size: 11px; color: var(--text-muted); font-weight: 400; }

    /* ── 카드 옵션 ── */
    .card-options { display: flex; flex-direction: column; gap: 8px; }
    .card-option { position: relative; }
    .card-option input { position: absolute; opacity: 0; width: 0; height: 0; }
    .card-option label {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-weight: 400; color: var(--text);
      transition: all 0.2s; user-select: none; line-height: 1.5;
    }
    .card-option label:hover { border-color: var(--pink-light); background: var(--bg-pink); }
    .card-option input:checked + label { border-color: var(--pink); background: var(--bg-pink); color: var(--dark); font-weight: 600; }
    .dot {
      width: 18px; height: 18px; border: 1.5px solid var(--border);
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .card-option input:checked + label .dot { background: var(--pink); border-color: var(--pink); }
    .card-option input:checked + label .dot::after {
      content: ''; width: 6px; height: 6px;
      background: white; border-radius: 50%; display: block;
    }
    .card-option.checkbox .dot { border-radius: 4px; }
    .card-option.checkbox input:checked + label .dot::after {
      content: '✓'; width: auto; height: auto;
      background: none; color: white; font-size: 10px; font-weight: 900; border-radius: 0;
    }

    /* 서비스 카드 */
    .service-card label {
      flex-direction: column; align-items: flex-start; gap: 0; padding: 18px 48px 18px 18px;
      position: relative;
    }
    .service-card label .dot { position: absolute; right: 16px; top: 20px; flex-shrink: 0; }
    .service-en {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 800;
      color: var(--dark); letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .service-name {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 2px;
    }
    .service-sub-tag {
      display: inline-block;
      font-size: 11px; color: var(--text-muted); font-weight: 400;
      margin-bottom: 8px;
    }
    .service-desc {
      font-size: 12px; color: var(--text-muted); line-height: 1.65;
      font-weight: 400; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px;
      width: 100%;
    }
    .service-card input:checked + label .service-en { color: var(--pink); }
    .service-card input:checked + label .service-desc { border-top-color: #FFD6EA; }

    /* 그리드 */
    .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 400px) { .grid-options { grid-template-columns: 1fr; } }

    /* ── 텍스트 입력 ── */
    .text-input {
      width: 100%; padding: 14px 16px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: 14px;
      font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--pink); }
    .text-input::placeholder { color: #C8C8C8; }

    /* ── 버튼 ── */
    .btn-wrap { display: flex; gap: 10px; margin-top: 40px; }
    .btn {
      flex: 1; padding: 16px; border-radius: var(--radius);
      font-size: 13px; font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 1px;
    }
    .btn-prev { background: var(--white); border: 1.5px solid var(--border); color: var(--text-muted); }
    .btn-prev:hover { border-color: var(--pink); color: var(--pink); }
    .btn-next { background: var(--dark); color: var(--white); }
    .btn-next:hover { background: var(--pink); }
    .btn-submit { background: var(--pink); color: var(--white); box-shadow: 0 4px 20px rgba(255,18,120,0.3); }
    .btn-submit:hover { background: var(--pink-dark); transform: translateY(-1px); }

    /* ── 완료 화면 ── */
    .done-screen { display: none; text-align: center; padding: 60px 20px; animation: fadeUp 0.4s ease; }
    .done-screen.show { display: block; }
    .done-mark {
      width: 68px; height: 68px; border: 1.5px solid var(--pink);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 24px; color: var(--pink);
    }
    .done-logo { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600; color: var(--pink); letter-spacing: 10px; padding-left: 10px; margin-bottom: 20px; text-align: center; }
    .done-logo .la { font-size: 25px; }
    .done-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
    .done-desc { font-size: 13px; color: var(--text-muted); line-height: 2; white-space: pre-line; }
    .done-info {
      margin-top: 28px; background: var(--off-white);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; text-align: left;
    }
    .done-info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .done-info-row:last-child { border-bottom: none; }
    .done-info-row .key { color: var(--text-muted); }
    .done-info-row .val { font-weight: 700; color: var(--dark); }

    /* ── 에러 ── */
    .error-msg { font-size: 12px; color: var(--pink); margin-top: 6px; display: none; }
    .error-msg.show { display: block; }

    /* ── 개인정보 동의 ── */
    .privacy-box {
      margin-top: 32px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      background: var(--off-white);
    }
    .privacy-item { margin-bottom: 14px; }
    .privacy-item:last-child { margin-bottom: 0; }
    .privacy-label {
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer; user-select: none;
    }
    .privacy-label input[type="checkbox"] { display: none; }
    .privacy-check {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 1.5px solid var(--border); border-radius: 4px;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .privacy-label input:checked ~ .privacy-check {
      background: var(--pink); border-color: var(--pink);
    }
    .privacy-label input:checked ~ .privacy-check::after {
      content: '✓'; color: #fff; font-size: 11px; font-weight: 900;
    }
    .privacy-text { font-size: 13px; font-weight: 600; color: var(--dark); line-height: 1.4; }
    .required-item .privacy-text::before { content: '[필수] '; color: var(--pink); }
    .privacy-detail {
      font-size: 11px; color: var(--text-muted); line-height: 1.6;
      margin: 6px 0 4px 28px;
    }
    .privacy-link {
      display: inline-block; margin-left: 28px;
      font-size: 11px; color: var(--pink);
      text-decoration: underline;
    }

    /* ── 사업자 정보 ── */
    .biz-info {
      margin-top: 16px;
      font-size: 11px; color: var(--text-muted);
      line-height: 1.8; text-align: center;
    }
  </style>
</head>
<body>

<!-- 언어 선택 화면 -->
<div class="lang-screen" id="langScreen">
  <div class="lang-hero">
    <img src="ahead-header.jpeg" alt="aHEAD" />
  </div>
  <div class="lang-inner">
    <div class="lang-title" id="langTitle">언어를 선택해주세요</div>
    <div class="lang-sub">Please select your language</div>
    <div class="lang-grid">
      <button class="lang-btn" onclick="selectLang('ko')">
        <span class="flag">🇰🇷</span>
        <div class="name">KO</div>
        <div class="native">한국어</div>
      </button>
      <button class="lang-btn" onclick="selectLang('en')">
        <span class="flag">🇺🇸</span>
        <div class="name">EN</div>
        <div class="native">English</div>
      </button>
      <button class="lang-btn" onclick="selectLang('zh')">
        <span class="flag">🇨🇳</span>
        <div class="name">ZH</div>
        <div class="native">中文</div>
      </button>
      <button class="lang-btn" onclick="selectLang('ja')">
        <span class="flag">🇯🇵</span>
        <div class="name">JA</div>
        <div class="native">日本語</div>
      </button>
    </div>
  </div>
</div>

<!-- 본 폼 -->
<header class="header" style="position:relative">
  <img src="ahead-header.jpeg" class="header-img" alt="aHEAD" />
  <button class="lang-switcher" id="langSwitchBtn" onclick="openLangScreen()" style="display:none"></button>
</header>

<div class="wrap" id="formWrap" style="display:none">

  <div class="notice">
    <strong id="nTitle">NOTICE</strong>
    <span id="nBody"></span>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="stepLabel">STEP 1 / 5</span>
      <span class="pct" id="stepPct">20%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="step-title" id="s1Title"></div>
    <div class="step-desc" id="s1Desc"></div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qResType"></span></div>
      <div class="card-options" id="reservationType">
        <div class="card-option">
          <input type="radio" name="reservationType" id="r1" value="">
          <label for="r1"><span class="dot"></span> <span id="rLabel1"></span></label>
        </div>
        <div class="card-option">
          <input type="radio" name="reservationType" id="r2" value="">
          <label for="r2"><span class="dot"></span> <span id="rLabel2"></span></label>
        </div>
        <div class="card-option">
          <input type="radio" name="reservationType" id="r3" value="">
          <label for="r3"><span class="dot"></span> <span id="rLabel3"></span></label>
        </div>
      </div>
      <div class="error-msg" id="err-reservationType"></div>
    </div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qConsType"></span></div>
      <div class="card-options" id="consultationType">
        <div class="card-option">
          <input type="radio" name="consultationType" id="c1" value="">
          <label for="c1"><span class="dot"></span> <span id="cLabel1"></span></label>
        </div>
        <div class="card-option">
          <input type="radio" name="consultationType" id="c2" value="">
          <label for="c2"><span class="dot"></span> <span id="cLabel2"></span></label>
        </div>
      </div>
      <div class="error-msg" id="err-consultationType"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-next" id="btnNext1" onclick="nextStep(1)"></button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div class="step-title" id="s2Title"></div>
    <div class="step-desc" id="s2Desc"></div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qName"></span></div>
      <input type="text" class="text-input" id="name" />
      <div class="error-msg" id="err-name"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qBirth"></span></div>
      <input type="text" class="text-input" id="birthdate" maxlength="8" />
      <div class="error-msg" id="err-birthdate"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qPhone"></span></div>
      <input type="tel" class="text-input" id="phone" />
      <div class="error-msg" id="err-phone"></div>
    </div>
    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qAddr"></span> <span class="q-hint" id="qAddrHint"></span></div>
      <input type="text" class="text-input" id="address" />
      <div class="error-msg" id="err-address"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-prev" id="btnPrev2" onclick="prevStep(2)"></button>
      <button class="btn btn-next" id="btnNext2" onclick="nextStep(2)"></button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="step-title" id="s3Title"></div>
    <div class="step-desc" id="s3Desc"></div>

    <div class="q-block">
      <div class="q-label"><span id="qTreatment"></span> <span class="q-hint" id="treatHint"></span></div>
      <div class="card-options" id="treatmentHistory">
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th1" value=""><label for="th1"><span class="dot"></span> <span id="thLabel1"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th2" value=""><label for="th2"><span class="dot"></span> <span id="thLabel2"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th3" value=""><label for="th3"><span class="dot"></span> <span id="thLabel3"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th4" value=""><label for="th4"><span class="dot"></span> <span id="thLabel4"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th5" value=""><label for="th5"><span class="dot"></span> <span id="thLabel5"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th6" value=""><label for="th6"><span class="dot"></span> <span id="thLabel6"></span></label></div>
        <div class="card-option checkbox"><input type="checkbox" name="treatmentHistory" id="th7" value=""><label for="th7"><span class="dot"></span> <span id="thLabel7"></span></label></div>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qVisitSrc"></span></div>
      <div class="card-options" id="visitSource">
        <div class="card-option"><input type="radio" name="visitSource" id="vs1" value="Instagram"><label for="vs1"><span class="dot"></span> Instagram</label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs2" value="YouTube"><label for="vs2"><span class="dot"></span> YouTube</label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs3" value=""><label for="vs3"><span class="dot"></span> <span id="vsLabel3"></span></label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs4" value=""><label for="vs4"><span class="dot"></span> <span id="vsLabel4"></span></label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs5" value=""><label for="vs5"><span class="dot"></span> <span id="vsLabel5"></span></label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs6" value=""><label for="vs6"><span class="dot"></span> <span id="vsLabel6"></span></label></div>
        <div class="card-option"><input type="radio" name="visitSource" id="vs7" value=""><label for="vs7"><span class="dot"></span> <span id="vsLabel7"></span></label></div>
      </div>
      <div class="error-msg" id="err-visitSource"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-prev" id="btnPrev3" onclick="prevStep(3)"></button>
      <button class="btn btn-next" id="btnNext3" onclick="nextStep(3)"></button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <div class="step-title" id="s4Title"></div>
    <div class="step-desc" id="s4Desc"></div>

    <div class="q-block">
      <div class="q-label"><span class="req">*</span> <span id="qScalp"></span> <span class="q-hint" id="scalpHint"></span></div>
      <div class="grid-options" id="scalpConcerns">

let lang = 'ko';
const TOTAL_STEPS = 5;
let currentStep = 1;

function selectLang(l) {
  lang = l;
  document.getElementById('langScreen').classList.add('hidden');
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('langSwitchBtn').style.display = 'block';
  applyTranslations();
  updateProgress();
}

function openLangScreen() {
  document.getElementById('langScreen').classList.remove('hidden');
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('langSwitchBtn').style.display = 'none';
}

function updateProgress() {

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepLabel').textContent = T[lang].step_of(currentStep, TOTAL_STEPS);
  document.getElementById('stepPct').textContent = pct + '%';
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  currentStep = n;
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}
function getCheckboxes(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
}
function showErr(id, show) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show', show);
}

function nextStep(from) {
  let valid = true;
  if (from === 1) {
    const rt = getRadio('reservationType'), ct = getRadio('consultationType');
    showErr('err-reservationType', !rt); showErr('err-consultationType', !ct);
    if (!rt || !ct) valid = false;
  }
  if (from === 2) {
    const n = document.getElementById('name').value.trim();
    const b = document.getElementById('birthdate').value.trim();
    const p = document.getElementById('phone').value.trim();
    const a = document.getElementById('address').value.trim();
    showErr('err-name', !n); showErr('err-birthdate', !b);
    showErr('err-phone', !p); showErr('err-address', !a);
    if (!n || !b || !p || !a) valid = false;
  }
  if (from === 3) {
    const vs = getRadio('visitSource');
    showErr('err-visitSource', !vs);
    if (!vs) valid = false;
  }
  if (from === 4) {
    const sc = getCheckboxes('scalpConcerns'), sf = getRadio('shampooFrequency');
    showErr('err-scalpConcerns', sc.length === 0); showErr('err-shampooFrequency', !sf);
    if (sc.length === 0 || !sf) valid = false;
  }
  if (valid) showStep(from + 1);
}

function prevStep(from) { showStep(from - 1); }

async function submitForm() {
  const ds = getCheckboxes('desiredServices'), vc = getRadio('videoConsent');
  const privacyOk = document.getElementById('privacyRequired').checked;
  showErr('err-desiredServices', ds.length === 0);
  showErr('err-videoConsent', !vc);
  showErr('err-privacy', !privacyOk);
  if (ds.length === 0 || !vc || !privacyOk) return;

  const payload = {
    language: lang,
    reservationType: getRadio('reservationType'),
    consultationType: getRadio('consultationType'),
    name: document.getElementById('name').value.trim(),
    birthdate: document.getElementById('birthdate').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    address: document.getElementById('address').value.trim(),
    treatmentHistory: getCheckboxes('treatmentHistory'),
    visitSource: getRadio('visitSource'),
    scalpConcerns: getCheckboxes('scalpConcerns'),
    shampooFrequency: getRadio('shampooFrequency'),
    desiredServices: ds,
    videoConsent: vc,
    marketingConsent: document.getElementById('privacyMarketing').checked ? '동의' : '비동의',
  };

  const L = T[lang];
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = L.btn_ing;

  try {
    const res = await fetch('/api/ahead/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('formWrap').style.display = 'none';
      const done = document.getElementById('doneScreen');
      done.classList.add('show');
      document.getElementById('doneTitle').textContent = L.done_title;
      document.getElementById('doneDesc').textContent = L.done_desc;
      document.getElementById('doneInfo').innerHTML = `
        <div class="done-info-row"><span class="key">${L.done_name}</span><span class="val">${payload.name}</span></div>
        <div class="done-info-row"><span class="key">${L.done_phone}</span><span class="val">${payload.phone}</span></div>
        <div class="done-info-row"><span class="key">${L.done_res}</span><span class="val">${payload.reservationType}</span></div>
        <div class="done-info-row"><span class="key">${L.done_serv}</span><span class="val">${payload.desiredServices.join(', ')}</span></div>
      `;
    } else {
      alert(data.message || L.err_server);
      btn.disabled = false; btn.textContent = L.btn_submit;
    }
  } catch {
    alert(T[lang].err_network);
    btn.disabled = false; btn.textContent = L.btn_submit;
  }
}
</script>
</body>
